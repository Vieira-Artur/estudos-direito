<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA: redireciona para index.html preservando o caminho como ?p=...
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/'); // ex: "/estudos-direito"
    var rest = l.pathname.slice(base.length) || '/';        // ex: "/processual-penal-ii/teoria-geral-provas"
    l.replace(l.origin + base + '/?p=' + encodeURIComponent(rest) + l.hash);
  </script>
</head>
</html>
