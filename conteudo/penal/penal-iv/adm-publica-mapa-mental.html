<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental – Crimes contra a Administração Pública</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1F497D;--navy-dark:#162f52;--navy-light:#2c5f9e;
  --gold:#C9A84C;--gold-light:#e8c96a;
  --text:#1a1a2e;--text-muted:#4a5568;--bg:#f0f4f8;--white:#ffffff;
  --shadow:0 4px 16px rgba(31,73,125,0.15);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Source Sans 3',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --navy:#4a7fb5;--navy-dark:#3a6494;--navy-light:#6a9fd4;
    --gold:#e8c96a;--gold-light:#f0d890;
    --text:#e8eaf0;--text-muted:#a0aec0;--bg:#111827;--white:#1e2535;
    --shadow:0 4px 16px rgba(0,0,0,0.4);
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;}
header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.header-title{font-family:var(--serif);color:#fff;font-size:18px;font-weight:700;}
.header-sub{color:var(--gold-light);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.controls{display:flex;gap:8px;align-items:center;}
.btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:6px;padding:6px 12px;font-family:var(--sans);font-size:14px;cursor:pointer;transition:background .15s;}
.btn:hover{background:rgba(255,255,255,.2);}
.zoom-info{color:rgba(255,255,255,.7);font-size:14px;min-width:44px;text-align:center;}
#canvas-wrap{position:fixed;top:64px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;}
#canvas-wrap:active{cursor:grabbing;}
#canvas{position:absolute;transform-origin:0 0;}
#tooltip{position:fixed;z-index:200;max-width:340px;background:var(--white);border:1.5px solid var(--navy);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);pointer-events:none;opacity:0;transition:opacity .15s;font-family:var(--sans);}
#tooltip.show{opacity:1;}
#tooltip .tt-title{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px;border-bottom:1px solid rgba(31,73,125,.15);padding-bottom:6px;}
#tooltip .tt-body{font-size:14px;line-height:1.55;color:var(--text);}
#tooltip .tt-art{font-size:12.5px;color:var(--navy);font-weight:600;margin-top:8px;background:rgba(31,73,125,.08);padding:4px 8px;border-radius:4px;}
#tooltip .tt-stj{font-size:12px;color:#7c4d00;margin-top:6px;padding:4px 8px;background:#fff8e0;border-left:3px solid var(--gold);border-radius:0 4px 4px 0;}
@media(prefers-color-scheme:dark){#tooltip .tt-stj{background:#2a2000;color:var(--gold);}}
.legend{position:fixed;bottom:16px;left:16px;z-index:100;background:var(--white);border:1px solid rgba(31,73,125,.18);border-radius:8px;padding:10px 14px;font-size:13px;box-shadow:0 2px 8px rgba(31,73,125,.12);}
.legend-row{display:flex;align-items:center;gap:8px;margin:3px 0;color:var(--text-muted);}
.legend-dot{width:14px;height:14px;border-radius:50%;}
.hint{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--white);border:1px solid rgba(31,73,125,.15);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-muted);box-shadow:0 2px 8px rgba(31,73,125,.12);line-height:1.6;}
</style>
</head>
<body>
<header>
  <div>
    <div class="header-title">Crimes contra a Administração Pública</div>
    <div class="header-sub">Título XI · CP — Mapa Mental · Direito Penal IV</div>
  </div>
  <div class="controls">
    <span class="zoom-info" id="zoom-label">100%</span>
    <button class="btn" onclick="zoomBy(0.15)">＋</button>
    <button class="btn" onclick="zoomBy(-0.15)">－</button>
    <button class="btn" onclick="resetView()">↺ Reset</button>
  </div>
</header>
<div id="canvas-wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg" width="2600" height="2200"></svg>
</div>
<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-body" id="tt-body"></div>
  <div class="tt-art" id="tt-art" style="display:none"></div>
  <div class="tt-stj" id="tt-stj" style="display:none"></div>
</div>
<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:#1F497D"></div>Nó central</div>
  <div class="legend-row"><div class="legend-dot" style="background:#2c5f9e"></div>Capítulo</div>
  <div class="legend-row"><div class="legend-dot" style="background:#4a7a4a"></div>Crime por func. público</div>
  <div class="legend-row"><div class="legend-dot" style="background:#8b3a3a"></div>Crime por particular</div>
  <div class="legend-row"><div class="legend-dot" style="background:#C9A84C"></div>Jurisprudência / Distinção</div>
</div>
<div class="hint">🖱 Arraste · Scroll para zoom · Clique nos nós</div>

<script>
const DATA = {
  id:"root", label:"Crimes contra a\nAdministração Pública", sub:"Título XI – CP", type:"root",
  tip:{title:"Crimes contra a Administração Pública",body:"Título XI do CP (arts. 312–359). Protege a moralidade, a probidade e o regular funcionamento da Administração. Rogério Greco: o corrupto é um 'exterminador', pois impede o Estado de cumprir suas funções sociais. Princípio da insignificância: inaplicável (Súm. 599 STJ).",art:"CP, arts. 312–359 · Título XI"},
  children:[
    {
      id:"cap1", label:"Crimes por\nFunc. Público", sub:"Cap. I – arts. 312–326", type:"chapter",
      tip:{title:"Capítulo I – Crimes praticados por funcionário público",body:"Crimes funcionais próprios (prevaricação, concussão, etc.) e impróprios (peculato-furto). A qualidade de funcionário público é elementar do tipo. Comunicabilidade via art. 30 CP ao coautor civil ciente da qualidade funcional.",art:"Arts. 312–326 CP"},
      children:[
        {id:"pec", label:"Peculato", sub:"Art. 312 CP", type:"crime",
         tip:{title:"Peculato – Art. 312 CP",body:"Quatro modalidades: (a) peculato-apropriação (caput, 1.ª parte); (b) peculato-desvio (caput, 2.ª parte); (c) peculato-furto impróprio (§1.º); (d) peculato culposo (§2.º). Crime próprio quanto ao sujeito ativo. Origem no latim: 'peculatus' = subtração de bens estatais. Súm. 599 STJ: insignificância inaplicável.",art:"Art. 312 CP · Reclusão 2–12 anos + multa (doloso). §2.º: detenção 3m–1 ano (culposo)"},
         children:[
           {id:"p1",label:"Peculato-\nApropriação",sub:"caput 1.ª p.",type:"crime",tip:{title:"Peculato-apropriação",body:"Apropriar-se o funcionário público de dinheiro, valor ou bem móvel público ou particular, de que tem a posse em razão do cargo. Não pune o 'peculato de uso'.",art:"Art. 312, caput – Rec. 2–12 anos + multa"}},
           {id:"p2",label:"Peculato-\nDesvio",sub:"caput 2.ª p.",type:"crime",tip:{title:"Peculato-desvio",body:"Desviar o bem em proveito próprio ou alheio. O desvio importa em dar ao bem destinação diversa da devida, sem necessariamente apropriar-se dele.",art:"Art. 312, caput – Rec. 2–12 anos + multa"}},
           {id:"p3",label:"Peculato-Furto\n(impróprio)",sub:"§ 1.º",type:"crime",tip:{title:"Peculato-furto (impróprio) – art. 312, §1.º",body:"Funcionário que, embora não tendo a posse, subtrai ou concorre para a subtração do bem, valendo-se das facilidades do cargo. Distingue-se do furto comum pela facilidade inerente ao exercício do cargo.",art:"Art. 312, §1.º – Rec. 2–12 anos + multa · Súm. 599 STJ: insignificância inaplicável"}},
           {id:"p4",label:"Peculato\nCulposo",sub:"§ 2.º",type:"elem",tip:{title:"Peculato culposo – art. 312, §2.º",body:"O funcionário concorre culposamente para que terceiro cometa o crime. Detenção 3m–1 ano. Reparação do dano antes da sentença irrecorrível: extinção da punibilidade. Reparação após: reduz pena à metade.",art:"Art. 312, §2.º – Det. 3m–1 ano"}},
           {id:"p5",label:"Peculato\nEletrônico",sub:"Art. 313-A",type:"crime",tip:{title:"Peculato eletrônico – Art. 313-A",body:"Inserir ou facilitar a inserção de dados falsos, ou alterar/excluir dados corretos nos sistemas informatizados da Administração Pública, com fim de obter vantagem indevida ou causar dano. Crime próprio (funcionário autorizado).",art:"Art. 313-A CP – Rec. 2–12 anos + multa"}}
         ]},
        {id:"con", label:"Concussão", sub:"Art. 316 CP", type:"crime",
         tip:{title:"Concussão – Art. 316 CP",body:"Exigir, para si ou para outrem, vantagem indevida, ainda que fora da função ou antes de assumi-la, mas em razão dela. Crime formal: consuma-se com a exigência, não com o recebimento. Vantagem de qualquer natureza. Médico do SUS: concussão (não extorsão), competência Estadual.",art:"Art. 316 CP – Rec. 2–8 anos + multa"},
         children:[
           {id:"c1",label:"Exação\nVexatória",sub:"§ 1.º",type:"crime",tip:{title:"Exação vexatória – art. 316, §1.º",body:"Funcionário que exige tributo ou contribuição que sabe indevido, ou emprega, na cobrança, meio vexatório ou gravoso que a lei não autoriza.",art:"Art. 316, §1.º – Det. 3m–1 ano"}},
           {id:"c2",label:"Concussão ×\nCorrupção",sub:"Distinção",type:"juris",tip:{title:"Distinção: concussão × corrupção passiva",body:"Concussão: funcionário EXIGE (coação implícita). Corrupção passiva: funcionário SOLICITA, RECEBE ou ACEITA promessa (ausência de coação). 'O verdadeiro critério está na presença ou ausência de coação; ela existe na primeira e inexiste na segunda.' (Edmundo Oliveira).",art:"Arts. 316 e 317 CP"}},
           {id:"c3",label:"Concussão ×\nExtorsão",sub:"Distinção",type:"juris",tip:{title:"Distinção: concussão × extorsão",body:"Extorsão (art. 158): violência ou grave ameaça explícita; vantagem necessariamente econômica. Concussão (art. 316): exigência sem violência/ameaça explícita; vantagem de qualquer natureza. — STJ, HC 198.750/SP",art:"Arts. 158 e 316 CP"}}
         ]},
        {id:"corp", label:"Corrupção\nPassiva", sub:"Art. 317 CP", type:"crime",
         tip:{title:"Corrupção passiva – Art. 317 CP",body:"Solicitar ou receber vantagem indevida, ou aceitar promessa, em razão da função, ainda que fora dela ou antes de assumi-la. §1.º: aumento de 1/3 se o ato de ofício é retardado, omitido ou praticado com infração de dever funcional. §2.º: corrupção passiva privilegiada (ceder a pedido ou influência).",art:"Art. 317 CP – Rec. 2–12 anos + multa"},
         children:[
           {id:"cr1",label:"Corrupção ×\nEstelionato",sub:"Distinção",type:"juris",tip:{title:"Distinção: corrupção passiva × estelionato",body:"Se o funcionário recebe mas não pratica o ato prometido ao corruptor, pode haver estelionato em vez de corrupção passiva — depende se o funcionário tinha intenção de praticar o ato ou apenas enganou o particular.",art:"Arts. 171 e 317 CP"}}
         ]},
        {id:"prev", label:"Prevaricação", sub:"Art. 319 CP", type:"crime",
         tip:{title:"Prevaricação – Art. 319 CP",body:"Retardar ou deixar de praticar, indevidamente, ato de ofício, ou praticá-lo contra disposição expressa de lei, para satisfazer interesse ou sentimento pessoal. Elemento subjetivo especial: 'para satisfazer interesse ou sentimento pessoal' — sem ele, o fato é atípico. Jurisprudência do STJ exige demonstração concreta do interesse/sentimento.",art:"Art. 319 CP – Det. 3m–1 ano"},
         children:[
           {id:"pr1",label:"Prevaricação\nImprópria",sub:"Art. 319-A",type:"crime",tip:{title:"Prevaricação imprópria – Art. 319-A",body:"Diretor de penitenciária ou agente público que deixa de cumprir seu dever de vedar ao preso o acesso a aparelho telefônico ou similar. Lei 9.455/97.",art:"Art. 319-A CP – Det. 3m–1 ano"}}
         ]},
        {id:"indg", label:"Condescendência\nCriminosa", sub:"Art. 320 CP", type:"crime",
         tip:{title:"Condescendência criminosa – Art. 320 CP",body:"Deixar o funcionário, por indulgência, de responsabilizar subordinado que cometeu infração no exercício do cargo, ou, quando lhe falte competência, não levar o fato ao conhecimento da autoridade competente.",art:"Art. 320 CP – Det. 15 dias–1 mês"}},
        {id:"abd", label:"Advocacia\nAdministrativa", sub:"Art. 321 CP", type:"crime",
         tip:{title:"Advocacia administrativa – Art. 321 CP",body:"Patrocinar, direta ou indiretamente, interesse privado perante a Administração Pública, valendo-se da qualidade de funcionário. Qualificado se interesse é ilegítimo.",art:"Art. 321 CP – Det. 1–3 meses; qualificado: Det. 3m–1 ano"}},
        {id:"vio", label:"Violência\nArbitrária", sub:"Art. 322 CP", type:"crime",
         tip:{title:"Violência arbitrária – Art. 322 CP",body:"Praticar violência, no exercício de função ou a pretexto de exercê-la, contra funcionário público ou particular. Aplica-se sem prejuízo da pena correspondente à violência.",art:"Art. 322 CP – Det. 6m–3 anos + pena da violência"}},
        {id:"emp", label:"Emprego Irregular\nde Verbas", sub:"Art. 315 CP", type:"crime",
         tip:{title:"Emprego irregular de verbas públicas – Art. 315 CP",body:"Dar às verbas ou rendas públicas aplicação diversa da estabelecida em lei. Princípio da legalidade orçamentária. Se praticado por prefeito: aplica-se o Decreto-Lei n.º 201/67.",art:"Art. 315 CP – Det. 1–3 meses; se prefeito: DL 201/67"}}
      ]
    },
    {
      id:"cap2", label:"Crimes por\nParticular", sub:"Cap. II – arts. 328–337", type:"chapter",
      tip:{title:"Capítulo II – Crimes praticados por particular contra a Administração",body:"Crimes que não exigem qualidade especial do agente. Incluem usurpação de função, resistência, desobediência, desacato, corrupção ativa, descaminho, contrabando e tráfico de influência.",art:"Arts. 328–337 CP"},
      children:[
        {id:"usurp", label:"Usurpação de\nFunção Pública", sub:"Art. 328 CP", type:"part",
         tip:{title:"Usurpação de função pública – Art. 328 CP",body:"Usurpar o exercício de função pública. Exige prática efetiva de ato funcional — não basta apresentar-se como funcionário. Se a apresentação for sem prática de ato: contravenção penal (art. 45 LCP). Qualificado se com vantagem.",art:"Art. 328 CP – Det. 3m–2 anos; qualificado: Rec. 2–5 anos"}},
        {id:"res", label:"Resistência", sub:"Art. 329 CP", type:"part",
         tip:{title:"Resistência – Art. 329 CP",body:"Opor-se à execução de ato legal mediante violência ou ameaça a funcionário competente. Resistência passiva (sem violência ou ameaça) pode configurar desobediência, não resistência. Possível concurso real com desacato (Rogério Greco).",art:"Art. 329 CP – Det. 2m–2 anos"}},
        {id:"desob", label:"Desobediência", sub:"Art. 330 CP", type:"part",
         tip:{title:"Desobediência – Art. 330 CP",body:"Desobedecer a ordem legal de funcionário público. Resistência passiva (sem violência). Distinção com resistência: esta é 'desobediência belicosa' (Hungria). Subsidiariedade: se outra lei prevê sanção, o art. 330 é afastado.",art:"Art. 330 CP – Det. 15 dias–6 meses ou multa"}},
        {id:"des", label:"Desacato", sub:"Art. 331 CP", type:"part",
         tip:{title:"Desacato – Art. 331 CP",body:"Desacatar funcionário público no exercício da função ou em razão dela. Exige presença do funcionário (não necessariamente face a face). Nexo funcional obrigatório. Concurso com resistência possível (Greco): finalidades distintas.",art:"Art. 331 CP – Det. 6m–2 anos"}},
        {id:"traf", label:"Tráfico de\nInfluência", sub:"Art. 332 CP", type:"part",
         tip:{title:"Tráfico de influência – Art. 332 CP",body:"Solicitar, exigir, cobrar ou obter vantagem a pretexto de influir em ato de funcionário público. O agente age como estelionatário: a influência pode não existir. Crime formal. Qualificado se a vantagem é para influir em processo judicial ou administrativo.",art:"Art. 332 CP – Rec. 2–5 anos; qualificado: Rec. 3–8 anos"}},
        {id:"cor_at", label:"Corrupção\nAtiva", sub:"Art. 333 CP", type:"part",
         tip:{title:"Corrupção ativa – Art. 333 CP",body:"Oferecer ou prometer vantagem indevida a funcionário público para determiná-lo a praticar, omitir ou retardar ato de ofício. Consuma-se com o oferecimento/promessa. Aumento de 1/3 se o ato visado é ilícito. Quem apenas dá após solicitação do funcionário (sem oferecer antes): atípico quanto ao art. 333 (não há 'dar' no tipo).",art:"Art. 333 CP – Rec. 2–12 anos + multa"}},
        {id:"desc", label:"Descaminho", sub:"Art. 334 CP", type:"part",
         tip:{title:"Descaminho – Art. 334 CP",body:"Iludir, no todo ou em parte, o pagamento de direito ou imposto sobre entrada, saída ou consumo de mercadoria. Princípio da insignificância: possível quando o tributo sonegado for inferior ao patamar de R$ 20.000,00 (arts. 20 Lei 10.522/02 + Portarias MF 75 e 130/2012) — STF/STJ.",art:"Art. 334 CP – Rec. 1–4 anos. §3.º: dobro se aéreo/marítimo/fluvial"}},
        {id:"cont", label:"Contrabando", sub:"Art. 334-A CP", type:"part",
         tip:{title:"Contrabando – Art. 334-A CP",body:"Importar ou exportar mercadoria proibida. Distinção com descaminho: descaminho = tributo não pago; contrabando = mercadoria proibida (independentemente de tributo). Princípio da insignificância: inaplicável ao contrabando — bem jurídico tutelado inclui saúde, segurança e moralidade, além do erário.",art:"Art. 334-A CP – Rec. 2–5 anos"}}
      ]
    },
    {
      id:"cap3", label:"Crimes por\nFunc. Estrangeiro", sub:"Cap. II-A – arts. 337-B–D", type:"chapter",
      tip:{title:"Capítulo II-A – Crimes contra a Administração Pública estrangeira",body:"Corrupção ativa em transação comercial internacional (art. 337-B) e tráfico de influência em transação comercial internacional (art. 337-C). Conceito de funcionário público estrangeiro: art. 337-D.",art:"Arts. 337-B a 337-D CP"},
      children:[
        {id:"ce1",label:"Corrupção Ativa\nInternacional",sub:"Art. 337-B",type:"part",tip:{title:"Corrupção ativa – transação internacional",body:"Prometer, oferecer ou dar vantagem indevida a funcionário público estrangeiro ou a pessoa a ele equiparada para determiná-lo a praticar, omitir ou retardar ato de ofício relacionado à transação comercial internacional.",art:"Art. 337-B CP – Rec. 1–8 anos + multa"}}
      ]
    },
    {
      id:"cap4", label:"Crimes contra\nAdm. Judiciária", sub:"Cap. III – arts. 338–359", type:"chapter",
      tip:{title:"Capítulo III – Crimes contra a Administração da Justiça",body:"Reintegração de animal (art. 338), falso testemunho (art. 342), falsa perícia (art. 342), coação no processo (art. 344), exploração de prestígio (art. 357), favorecimento pessoal (art. 348), favorecimento real (art. 349).",art:"Arts. 338–359 CP"},
      children:[
        {id:"ft",label:"Falso\nTestemunho",sub:"Art. 342 CP",type:"crime",tip:{title:"Falso testemunho – Art. 342 CP",body:"Fazer afirmação falsa, negar ou calar a verdade como testemunha, perito, contador, tradutor ou intérprete em processo judicial, policial, administrativo ou arbitral. Retratação antes da sentença: extinção da punibilidade.",art:"Art. 342 CP – Rec. 2–4 anos + multa; qualificado: 3–6 anos"}},
        {id:"fp",label:"Favorecimento\nPessoal",sub:"Art. 348 CP",type:"crime",tip:{title:"Favorecimento pessoal – Art. 348 CP",body:"Auxiliar a subtrair-se à ação de autoridade pública autor de crime a que é cominada pena de reclusão, valendo-se de habitação própria ou alheia, ou coisa pública ou particular.",art:"Art. 348 CP – Det. 1–6 meses; qualificado se o beneficiado for cônjuge/parente"}},
        {id:"fr",label:"Favorecimento\nReal",sub:"Art. 349 CP",type:"crime",tip:{title:"Favorecimento real – Art. 349 CP",body:"Prestar a criminoso, fora dos casos de coautoria ou receptação, auxílio destinado a tornar seguro o proveito do crime. Distinção com favorecimento pessoal: este favorece a pessoa; aquele favorece o produto/proveito do crime.",art:"Art. 349 CP – Det. 1–6 meses"}}
      ]
    },
    {
      id:"princ_adm", label:"Princípios e\nRegras Gerais", sub:"Aplicáveis ao Título XI", type:"chapter",
      tip:{title:"Princípios e regras gerais – Título XI CP",body:"1. Conceito de funcionário público: art. 327 (transitório, sem remuneração). §1.º: funcionários equiparados (entidades paraestatais, concessionárias). §2.º: comissionados/diretores: +1/3 de pena. 2. Súmula 599 STJ: insignificância inaplicável. 3. Comunicabilidade de elementares: art. 30 CP.",art:"Arts. 327 e 30 CP · Súm. 599 STJ"},
      children:[
        {id:"fp_def",label:"Funcionário\nPúblico",sub:"Art. 327 CP",type:"elem",tip:{title:"Conceito penal de funcionário público – Art. 327",body:"Quem, embora transitoriamente ou sem remuneração, exerce cargo, emprego ou função pública. Equiparados (§1.º): entidades paraestatais, concessionárias de serviço público. Comissionados/diretores: aumento de 1/3 (§2.º).",art:"Art. 327 CP"}},
        {id:"insignif",label:"Insignificância\nInaplicável",sub:"Súm. 599 STJ",type:"juris",tip:{title:"Súmula 599 STJ — Princípio da insignificância",body:"O princípio da insignificância é inaplicável aos crimes contra a Administração Pública. Fundamento: o bem jurídico tutelado é a moralidade administrativa, insuscetível de valoração econômica.",art:"STJ – Súmula 599",stj:"Exceção possível: descaminho (valores abaixo de R$ 20.000,00) — STF/STJ em divergência"}},
        {id:"comuni",label:"Comunicação\nde Elementares",sub:"Art. 30 CP",type:"elem",tip:{title:"Comunicabilidade de elementares – Art. 30 CP",body:"A qualidade de funcionário público, sendo elementar do crime, comunica-se ao particular que participar do fato ciente dessa qualidade. Ex.: extraneus que concorre para o peculato responde pelo mesmo delito se ciente da condição funcional do coautor.",art:"Art. 30 CP"}},
        {id:"reparacao",label:"Reparação do\nDano – Peculato",sub:"Efeito extintivo",type:"elem",tip:{title:"Reparação do dano no peculato culposo",body:"No peculato culposo (§2.º), a reparação do dano antes da sentença irrecorrível extingue a punibilidade. Se a reparação ocorre após a sentença irrecorrível, reduz-se a pena de metade.",art:"Art. 312, §3.º CP"}}
      ]
    }
  ]
};

const COLORS = {
  root:   {fill:"#1F497D",stroke:"#162f52",text:"#ffffff"},
  chapter:{fill:"#2c5f9e",stroke:"#1F497D",text:"#ffffff"},
  crime:  {fill:"#4a7a4a",stroke:"#3a6a3a",text:"#ffffff"},
  part:   {fill:"#8b3a3a",stroke:"#6a2828",text:"#ffffff"},
  elem:   {fill:"#5a5a8a",stroke:"#3a3a6a",text:"#ffffff"},
  juris:  {fill:"#C9A84C",stroke:"#a07a28",text:"#1a1200"}
};

const W=2600,H=2200;
const svg=document.getElementById("canvas");
svg.setAttribute("width",W);svg.setAttribute("height",H);
let zoom=1,panX=0,panY=0,dragging=false,lastX=0,lastY=0;
const wrap=document.getElementById("canvas-wrap");
wrap.addEventListener("mousedown",e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener("mouseup",()=>{dragging=false;});
window.addEventListener("mousemove",e=>{if(!dragging)return;panX+=e.clientX-lastX;panY+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;applyTransform();});
wrap.addEventListener("wheel",e=>{e.preventDefault();zoomBy(e.deltaY>0?-0.08:0.08,e.clientX,e.clientY);},{passive:false});
function applyTransform(){svg.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;document.getElementById("zoom-label").textContent=Math.round(zoom*100)+"%";}
function zoomBy(d,cx,cy){const old=zoom;zoom=Math.max(.3,Math.min(2.5,zoom+d));if(cx!==undefined){panX=cx-(cx-panX)*(zoom/old);panY=cy-(cy-panY)*(zoom/old);}applyTransform();}
function resetView(){zoom=1;panX=0;panY=0;applyTransform();}
function mkEl(tag,attrs){const el=document.createElementNS("http://www.w3.org/2000/svg",tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el;}

function layoutTree(node,cx,cy,angle,spread,depth){
  node.x=cx;node.y=cy;
  if(!node.children||!node.children.length)return;
  const n=node.children.length;
  const radii=[0,310,200,185];
  const r=radii[Math.min(depth,radii.length-1)];
  const startA=angle-spread/2;
  node.children.forEach((ch,i)=>{
    const a=n===1?angle:startA+(spread/(n-1))*i;
    const rad=a*Math.PI/180;
    layoutTree(ch,cx+Math.cos(rad)*r,cy+Math.sin(rad)*r,a,depth===0?50:60,depth+1);
  });
}
const ROOT_X=W/2,ROOT_Y=H/2;
DATA.children.forEach((ch,i)=>{
  const a=-90+(360/DATA.children.length)*i;
  const rad=a*Math.PI/180;
  ch.x=ROOT_X+Math.cos(rad)*400;ch.y=ROOT_Y+Math.sin(rad)*400;
  if(ch.children){layoutTree(ch,ch.x,ch.y,a,ch.children.length<=3?60:90,1);}
});
DATA.x=ROOT_X;DATA.y=ROOT_Y;

const edgeLayer=mkEl("g",{});svg.appendChild(edgeLayer);
function drawEdges(node){
  if(!node.children)return;
  node.children.forEach(ch=>{
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    const mx=(node.x+ch.x)/2;
    path.setAttribute("d",`M${node.x},${node.y} Q${mx},${node.y} ${ch.x},${ch.y}`);
    path.setAttribute("fill","none");path.setAttribute("stroke","#94a3b8");path.setAttribute("stroke-width","1.2");path.setAttribute("opacity","0.4");
    edgeLayer.appendChild(path);drawEdges(ch);
  });
}
drawEdges(DATA);

function drawNode(node,isRoot){
  const c=COLORS[node.type]||COLORS.crime;
  const lines=node.label.split("\n");
  const fw=isRoot?130:(node.type==="chapter"?110:(lines[0].length>14?105:92));
  const fh=isRoot?66:(node.type==="chapter"?56:lines.length>1?50:42);
  const rx=node.x-fw/2,ry=node.y-fh/2;
  const g=mkEl("g",{"data-id":node.id,style:"cursor:pointer"});
  const sh=mkEl("rect",{x:rx+2,y:ry+3,width:fw,height:fh,rx:9,fill:"rgba(0,0,0,0.16)"});
  g.appendChild(sh);
  const rect=mkEl("rect",{x:rx,y:ry,width:fw,height:fh,rx:9,fill:c.fill,stroke:c.stroke,"stroke-width":isRoot?2.5:1.5});
  g.appendChild(rect);
  const lineH=16,totalH=lines.length*lineH;
  lines.forEach((line,i)=>{
    const ty=node.y-totalH/2+i*lineH+lineH/2;
    const t=mkEl("text",{x:node.x,y:ty,"text-anchor":"middle","dominant-baseline":"central",fill:c.text,"font-size":isRoot?"13":(node.type==="chapter"?"12":"11"),"font-weight":isRoot?"700":(node.type==="chapter"?"600":"500"),"font-family":isRoot?"var(--serif,'Playfair Display',serif)":"var(--sans,'Source Sans 3',sans-serif)"});
    t.textContent=line;g.appendChild(t);
  });
  if(node.sub&&!isRoot){
    const sub=mkEl("text",{x:node.x,y:node.y+fh/2-8,"text-anchor":"middle","dominant-baseline":"central",fill:"rgba(255,255,255,0.7)","font-size":"9","font-family":"var(--sans)"});
    sub.textContent=node.sub;g.appendChild(sub);
  }
  g.addEventListener("mouseenter",e=>showTip(e,node));
  g.addEventListener("mouseleave",hideTip);
  g.addEventListener("mousemove",e=>moveTip(e));
  svg.appendChild(g);
}
function drawAll(node,isRoot){drawNode(node,isRoot);if(node.children)node.children.forEach(ch=>drawAll(ch,false));}
drawAll(DATA,true);

const tt=document.getElementById("tooltip");
const ttTitle=document.getElementById("tt-title");
const ttBody=document.getElementById("tt-body");
const ttArt=document.getElementById("tt-art");
const ttStj=document.getElementById("tt-stj");
function showTip(e,node){
  if(!node.tip)return;
  ttTitle.textContent=node.tip.title;ttBody.textContent=node.tip.body;
  if(node.tip.art){ttArt.textContent=node.tip.art;ttArt.style.display="";}else{ttArt.style.display="none";}
  if(node.tip.stj){ttStj.textContent=node.tip.stj;ttStj.style.display="";}else{ttStj.style.display="none";}
  moveTip(e);tt.classList.add("show");
}
function hideTip(){tt.classList.remove("show");}
function moveTip(e){
  const x=e.clientX+14,y=e.clientY-10;
  tt.style.left=Math.min(x,window.innerWidth-360)+"px";
  tt.style.top=Math.max(y,70)+"px";
}
panX=(window.innerWidth-W)/2;panY=((window.innerHeight-64)-H)/2+64;
applyTransform();
</script>
</body>
</html>
