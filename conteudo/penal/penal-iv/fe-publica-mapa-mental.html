<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental – Crimes contra a Fé Pública</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1F497D;
  --navy-dark: #162f52;
  --navy-light: #2c5f9e;
  --gold: #C9A84C;
  --gold-light: #e8c96a;
  --cream: #f5f0e8;
  --text: #1a1a2e;
  --text-muted: #4a5568;
  --bg: #f0f4f8;
  --white: #ffffff;
  --shadow: 0 4px 16px rgba(31,73,125,0.15);
  --shadow-sm: 0 2px 8px rgba(31,73,125,0.12);
  --node-r: 10;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Source Sans 3', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --navy: #4a7fb5;
    --navy-dark: #3a6494;
    --navy-light: #6a9fd4;
    --gold: #e8c96a;
    --gold-light: #f0d890;
    --cream: #1e2535;
    --text: #e8eaf0;
    --text-muted: #a0aec0;
    --bg: #111827;
    --white: #1e2535;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  }
}
:root[data-theme="dark"] {
  --navy: #4a7fb5;
  --navy-dark: #3a6494;
  --navy-light: #6a9fd4;
  --gold: #e8c96a;
  --gold-light: #f0d890;
  --cream: #1e2535;
  --text: #e8eaf0;
  --text-muted: #a0aec0;
  --bg: #111827;
  --white: #1e2535;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--navy);
  padding: 0 24px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.header-title {
  font-family: var(--serif);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.header-sub {
  font-family: var(--sans);
  color: var(--gold-light);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 2px;
}
.controls {
  display: flex; gap: 8px; align-items: center;
}
.btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  color: #fff;
  border-radius: 6px;
  padding: 6px 12px;
  font-family: var(--sans);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.2); }
.zoom-info {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  min-width: 44px;
  text-align: center;
}

/* ── CANVAS ── */
#canvas-wrap {
  position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
  overflow: hidden; cursor: grab;
}
#canvas-wrap:active { cursor: grabbing; }
#canvas { position: absolute; transform-origin: 0 0; }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; z-index: 200; max-width: 340px;
  background: var(--white);
  border: 1.5px solid var(--navy);
  border-radius: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s;
  font-family: var(--sans);
}
#tooltip.show { opacity: 1; }
#tooltip .tt-title {
  font-family: var(--serif);
  font-size: 15px; font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(31,73,125,0.15);
  padding-bottom: 6px;
}
#tooltip .tt-body {
  font-size: 14px; line-height: 1.55;
  color: var(--text);
}
#tooltip .tt-art {
  font-size: 12.5px;
  color: var(--navy);
  font-weight: 600;
  margin-top: 8px;
  background: var(--cream);
  padding: 4px 8px;
  border-radius: 4px;
  font-family: var(--sans);
}
#tooltip .tt-stj {
  font-size: 12px;
  color: #7c4d00;
  margin-top: 6px;
  padding: 4px 8px;
  background: #fff8e0;
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) #tooltip .tt-stj { background: #2a2000; color: #e8c96a; }
}
:root[data-theme="dark"] #tooltip .tt-stj { background: #2a2000; color: #e8c96a; }

/* ── LEGEND ── */
.legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 100;
  background: var(--white);
  border: 1px solid rgba(31,73,125,0.18);
  border-radius: 8px; padding: 10px 14px;
  font-size: 13px; box-shadow: var(--shadow-sm);
}
.legend-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; color: var(--text-muted); }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.legend-line { width: 24px; height: 2px; flex-shrink: 0; }

/* ── INSTRUCTIONS ── */
.hint {
  position: fixed; bottom: 16px; right: 16px; z-index: 100;
  background: var(--white);
  border: 1px solid rgba(31,73,125,0.15);
  border-radius: 8px; padding: 8px 12px;
  font-size: 12px; color: var(--text-muted);
  box-shadow: var(--shadow-sm);
  line-height: 1.6;
}
</style>
</head>

const COLORS = {

  crime:  { fill:"#4a7fb5", stroke:"#2c5f9e", text:"#ffffff" },
  elem:   { fill:"#6b8e6b", stroke:"#4a7360", text:"#ffffff" },

const W = 2400, H = 2000;
const svg = document.getElementById("canvas");
svg.setAttribute("width", W);
svg.setAttribute("height", H);

let zoom = 1, panX = 0, panY = 0;
let dragging = false, lastX = 0, lastY = 0;

const wrap = document.getElementById("canvas-wrap");
wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("mouseup", () => { dragging = false; });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  panX += e.clientX - lastX; panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  zoomBy(delta, e.clientX, e.clientY);
}, { passive: false });

function applyTransform() {
  svg.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById("zoom-label").textContent = Math.round(zoom * 100) + "%";
}
function zoomBy(delta, cx, cy) {
  const old = zoom;
  zoom = Math.max(0.3, Math.min(2.5, zoom + delta));
  if (cx !== undefined) {
    panX = cx - (cx - panX) * (zoom / old);
    panY = cy - (cy - panY) * (zoom / old);
  }
  applyTransform();
}
function resetView() {
  zoom = 1; panX = 0; panY = 0; applyTransform();
}

// ── LAYOUT ──
function layoutTree(node, cx, cy, angle, spread, depth) {
  node.x = cx; node.y = cy;
  if (!node.children || node.children.length === 0) return;
  const n = node.children.length;
  const radii = [0, 280, 195, 185, 180];
  const r = radii[Math.min(depth, radii.length - 1)];
  const startA = angle - spread / 2;
  node.children.forEach((ch, i) => {
    const a = n === 1 ? angle : startA + (spread / (n - 1)) * i;
    const rad = a * Math.PI / 180;
    const nx = cx + Math.cos(rad) * r;
    const ny = cy + Math.sin(rad) * r;
    const childSpread = depth === 0 ? 45 : 55;
    layoutTree(ch, nx, ny, a, childSpread, depth + 1);
  });
}

// Six chapters spread evenly around root
const ROOT_X = W / 2, ROOT_Y = H / 2;
const nCh = DATA.children.length;
DATA.children.forEach((ch, i) => {
  const a = -90 + (360 / nCh) * i;
  const rad = a * Math.PI / 180;
  const r = 380;
  ch._baseAngle = a;
  ch.x = ROOT_X + Math.cos(rad) * r;
  ch.y = ROOT_Y + Math.sin(rad) * r;
  if (ch.children) {
    const spread = ch.children.length <= 2 ? 50 : ch.children.length <= 4 ? 70 : 90;
    layoutTree(ch, ch.x, ch.y, a, spread, 1);
  }
});
DATA.x = ROOT_X; DATA.y = ROOT_Y;

// ── DRAW ──
function mkEl(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function drawEdge(x1, y1, x2, y2, col) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const path = mkEl("path", {
    d: `M${x1},${y1} Q${mx},${y1} ${x2},${y2}`,
    fill: "none", stroke: col || "#94a3b8",
    "stroke-width": "1.5", opacity: "0.55",
    "stroke-dasharray": ""
  });
  svg.appendChild(path);
}

function drawNode(node, isRoot) {
  const c = COLORS[node.type] || COLORS.crime;
  const lines = node.label.split("\n");
  const fw = isRoot ? 120 : (node.type === "chapter" ? 105 : 88);
  const fh = isRoot ? 62 : (node.type === "chapter" ? 54 : lines.length > 1 ? 50 : 40);
  const rx = node.x - fw / 2, ry = node.y - fh / 2;

  const g = mkEl("g", { "data-id": node.id, style: "cursor:pointer" });

  // Shadow
  const sh = mkEl("rect", {
    x: rx + 2, y: ry + 3, width: fw, height: fh,
    rx: 9, fill: "rgba(0,0,0,0.18)"
  });
  g.appendChild(sh);

  // Box
  const rect = mkEl("rect", {
    x: rx, y: ry, width: fw, height: fh,
    rx: 9, fill: c.fill, stroke: c.stroke,
    "stroke-width": isRoot ? 2.5 : 1.5
  });
  g.appendChild(rect);

  // Text
  const lineH = 16;
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    const ty = node.y - totalH / 2 + i * lineH + lineH / 2;
    const t = mkEl("text", {
      x: node.x, y: ty,
      "text-anchor": "middle",
      "dominant-baseline": "central",
      fill: c.text,
      "font-size": isRoot ? "13" : (node.type === "chapter" ? "12" : "11"),
      "font-weight": isRoot ? "700" : (node.type === "chapter" ? "600" : "500"),
      "font-family": isRoot ? "var(--serif, 'Playfair Display', serif)" : "var(--sans, 'Source Sans 3', sans-serif)"
    });
    t.textContent = line;
    g.appendChild(t);
  });

  // Sub-label
  if (node.sub && !isRoot) {
    const sub = mkEl("text", {
      x: node.x, y: node.y + fh / 2 - 8,
      "text-anchor": "middle",
      "dominant-baseline": "central",
      fill: "rgba(255,255,255,0.7)",
      "font-size": "9",
      "font-family": "var(--sans, 'Source Sans 3', sans-serif)"
    });
    sub.textContent = node.sub;
    g.appendChild(sub);
  }

  // Hover & click
  g.addEventListener("mouseenter", e => showTip(e, node));
  g.addEventListener("mouseleave", hideTip);
  g.addEventListener("mousemove", e => moveTip(e));

  svg.appendChild(g);
}

// Edges first (below nodes)
const edgeLayer = mkEl("g", {});
svg.appendChild(edgeLayer);

function drawEdges(node) {
  if (!node.children) return;
  node.children.forEach(ch => {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const mx = (node.x + ch.x) / 2;
    path.setAttribute("d", `M${node.x},${node.y} Q${mx},${node.y} ${ch.x},${ch.y}`);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", "#94a3b8");
    path.setAttribute("stroke-width", "1.2");
    path.setAttribute("opacity", "0.45");
    edgeLayer.appendChild(path);
    drawEdges(ch);
  });
}
drawEdges(DATA);

// Draw all nodes
function drawAll(node, isRoot) {
  drawNode(node, isRoot);
  if (node.children) node.children.forEach(ch => drawAll(ch, false));
}
drawAll(DATA, true);

// ── TOOLTIP ──
const tt = document.getElementById("tooltip");
const ttTitle = document.getElementById("tt-title");
const ttBody = document.getElementById("tt-body");
const ttArt = document.getElementById("tt-art");
const ttStj = document.getElementById("tt-stj");

function showTip(e, node) {
  if (!node.tip) return;
  ttTitle.textContent = node.tip.title;
  ttBody.textContent = node.tip.body;
  ttArt.textContent = node.tip.art || "";
  ttArt.style.display = node.tip.art ? "" : "none";
  if (node.tip.stj) {
    ttStj.textContent = node.tip.stj;
    ttStj.style.display = "";
  } else {
    ttStj.style.display = "none";
  }
  moveTip(e);
  tt.classList.add("show");
}
function hideTip() { tt.classList.remove("show"); }
function moveTip(e) {
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const maxX = window.innerWidth - 360;
  tt.style.left = Math.min(x, maxX) + "px";
  tt.style.top = Math.max(y, 70) + "px";
}

// Centre view
panX = (window.innerWidth - W) / 2;
panY = ((window.innerHeight - 64) - H) / 2 + 64;
applyTransform();
</script>
</body>
